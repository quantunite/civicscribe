# Railway's Linux build can't resolve the platform-native optional deps that the
# Windows-generated package-lock.json omits (npm optional-deps bug #4828), and
# the native binary's version must EXACTLY match the resolved oxide/lightningcss
# version. So: clean (lockfile-free) install, then install the arch+version
# matched Linux binaries dynamically off whatever versions actually resolved.
# Builder arch confirmed x86_64. Tailwind is pinned to 4.3.0 for determinism.

# Runtime media tools for the stream/course capture path (src/.../ytdlp.ts):
# yt-dlp fetches captions / extracts audio from a source URL, and yt-dlp needs
# ffmpeg for "-x --audio-format m4a". Both must be on PATH in the runtime image,
# so they go in the nix setup phase. node is listed explicitly so providing this
# phase does not drop the auto-detected Node toolchain.
[phases.setup]
nixPkgs = ["nodejs_22", "ffmpeg", "yt-dlp"]

[phases.install]
cmds = [
  "rm -f package-lock.json",
  "rm -rf node_modules",
  "npm install --include=optional --no-audit --no-fund",
  "node -e \"const v=require('@tailwindcss/oxide/package.json').version;require('child_process').execSync('npm install @tailwindcss/oxide-linux-x64-gnu@'+v+' --no-save --force --no-audit --no-fund',{stdio:'inherit'})\"",
  "node -e \"try{const v=require('lightningcss/package.json').version;require('child_process').execSync('npm install lightningcss-linux-x64-gnu@'+v+' --no-save --force --no-audit --no-fund',{stdio:'inherit'})}catch(e){console.log('lightningcss not present; skipping')}\"",
]

[phases.build]
cmds = ["npm run build"]
